name: Docker

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to publish (e.g. v1.2.3 or 1.2.3)"
        required: true
        type: string

jobs:
  bot:
    name: Build & push poex-bot
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch'
      || (github.event.workflow_run.conclusion == 'success'
          && github.event.workflow_run.event == 'push'
          && startsWith(github.event.workflow_run.head_branch, 'v'))
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.version }}"
          else
            TAG="${{ github.event.workflow_run.head_branch }}"
          fi
          VERSION="${TAG#v}"
          MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1-2)
          echo "full=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major_minor=$MAJOR_MINOR" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/sidiadevelopment/poex-bot
          tags: |
            type=raw,value=${{ steps.version.outputs.full }}
            type=raw,value=${{ steps.version.outputs.major_minor }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=poex-bot
          cache-to: type=gha,mode=max,scope=poex-bot

  web:
    name: Build & push poex-web
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch'
      || (github.event.workflow_run.conclusion == 'success'
          && github.event.workflow_run.event == 'push'
          && startsWith(github.event.workflow_run.head_branch, 'v'))
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.version }}"
          else
            TAG="${{ github.event.workflow_run.head_branch }}"
          fi
          VERSION="${TAG#v}"
          MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1-2)
          echo "full=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major_minor=$MAJOR_MINOR" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/sidiadevelopment/poex-web
          tags: |
            type=raw,value=${{ steps.version.outputs.full }}
            type=raw,value=${{ steps.version.outputs.major_minor }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=poex-web
          cache-to: type=gha,mode=max,scope=poex-web
